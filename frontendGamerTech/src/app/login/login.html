<div class="login-container">
    <div class="noise"></div>
    <div class="login-card">
        <h1>Es un gusto que estes aquí.</h1>
        <!-- LOGIN -->
        @if(!isRegistering){
        <h2>Inicia sesion para comenzar a comprar</h2>
        <form>
            <input type="text" placeholder="Ingresa tu usuario">
            <input type="password" placeholder="Ingresa tu contraseña">
            <div class="buttons">
                <button type="submit">
                    Iniciar sesión
                </button>
                <button type="button" (click)="showRegister()">
                    Registrarse
                </button>
            </div>
        </form>
        }
        <!-- REGISTRO -->
        @if(isRegistering){
        <h2>Crea una nueva cuenta</h2>
        <form>
            <input type="text" placeholder="Ingresa un usuario">
            <input type="password" placeholder="Ingresa una contraseña">
            <input type="password" placeholder="Confirma tu contraseña">
            <div class="buttons">
                <button type="submit">
                    Crear cuenta
                </button>
                <button type="button" (click)="cancelRegister()">
                    Cancelar
                </button>
            </div>
        </form>
        }
    </div>
</div>
